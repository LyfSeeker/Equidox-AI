services:
  postgres:
    image: postgres:16-alpine
    container_name: equidox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: equidox
    ports:
      - "5432:5432"
    volumes:
      - equidox_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d equidox"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: equidox-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      PORT: 4000
      NODE_ENV: production
      RUN_MIGRATIONS: "true"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/equidox
      STELLAR_NETWORK: ${STELLAR_NETWORK:-testnet}
      HORIZON_URL: ${HORIZON_URL:-https://horizon-testnet.stellar.org}
      SOROBAN_RPC_URL: ${SOROBAN_RPC_URL:-https://soroban-testnet.stellar.org}
      GRANT_MANAGER_CONTRACT_ID: ${GRANT_MANAGER_CONTRACT_ID:-CDCW4WXFK2BM7ND5TYSRLLWLCACZEJUKMXCFRFH6IIDDMFKLKSBNDAAQ}
      BUILDER_PASSPORT_CONTRACT_ID: ${BUILDER_PASSPORT_CONTRACT_ID:-CCWQCRUXF2P56F6Z4RZZXPOOQITN55X3QYVXF626PBC4UXTVQRB3WWOL}
      NATIVE_XLM_TOKEN_CONTRACT: ${NATIVE_XLM_TOKEN_CONTRACT:-CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC}
      IPFS_API_URL: ${IPFS_API_URL:-}
      IPFS_GATEWAY: ${IPFS_GATEWAY:-https://ipfs.io/ipfs/}
      X402_ENABLED: ${X402_ENABLED:-false}
      X402_PRICE_STROOPS: ${X402_PRICE_STROOPS:-1000000}
      INDEXER_ENABLED: ${INDEXER_ENABLED:-true}
      INDEXER_POLL_MS: ${INDEXER_POLL_MS:-15000}
      FRIENDBOT_URL: ${FRIENDBOT_URL:-https://friendbot.stellar.org}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
    depends_on:
      postgres:
        condition: service_healthy

  keycloak-db:
    image: postgres:16-alpine
    container_name: equidox-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    ports:
      - "5433:5432"
    volumes:
      - equidox_keycloak_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: equidox-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm", "--http-port=8180"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8180
      KC_HEALTH_ENABLED: "true"
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    ports:
      - "8180:8180"
    volumes:
      - ./keycloak/equidox-realm.json:/opt/keycloak/data/import/equidox-realm.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8180"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_STELLAR_NETWORK: ${NEXT_PUBLIC_STELLAR_NETWORK:-testnet}
        NEXT_PUBLIC_GRANT_MANAGER_CONTRACT_ID: ${GRANT_MANAGER_CONTRACT_ID:-CDCW4WXFK2BM7ND5TYSRLLWLCACZEJUKMXCFRFH6IIDDMFKLKSBNDAAQ}
        NEXT_PUBLIC_BUILDER_PASSPORT_CONTRACT_ID: ${BUILDER_PASSPORT_CONTRACT_ID:-CCWQCRUXF2P56F6Z4RZZXPOOQITN55X3QYVXF626PBC4UXTVQRB3WWOL}
        NEXT_PUBLIC_KEYCLOAK_URL: ${NEXT_PUBLIC_KEYCLOAK_URL:-http://localhost:8180}
        NEXT_PUBLIC_KEYCLOAK_REALM: ${NEXT_PUBLIC_KEYCLOAK_REALM:-equidox}
        NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${NEXT_PUBLIC_KEYCLOAK_CLIENT_ID:-equidox-frontend}
    container_name: equidox-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
    depends_on:
      - backend
      - keycloak

volumes:
  equidox_pg_data:
  equidox_keycloak_pg_data:
